<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connexion — Dahira Maftikhoul Jinan</title>
  <meta name="description" content="Page de connexion sécurisée pour l'administration financière de la Dahira Maftikhoul Jinan." />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .error-msg {
      background: var(--danger-light);
      color: var(--danger);
      border: 1px solid #f5c2c7;
      border-radius: var(--radius-sm);
      padding: .7rem 1rem;
      font-size: .85rem;
      margin-top: 1rem;
      display: flex;
      align-items: center;
      gap: .5rem;
      display: none;
    }

    .error-msg.show { display: flex; }

    .login-btn-full {
      width: 100%;
      padding: .8rem;
      font-size: .95rem;
      margin-top: .75rem;
      border-radius: var(--radius-md);
    }

  </style>
</head>
<body class="login-page">

  <div class="login-card">
    <div class="login-logo">
      <img
        src="logo.jpeg"
        alt="Logo Dahira Maftikhoul Jinan"
      />
      <h1>Dahira Maftikhoul Jinan</h1>
    </div>

    <form id="login-form" novalidate>
      <div class="form-group mb-2">
        <label for="email">Adresse e-mail</label>
        <input type="email" id="email" required autocomplete="email" />
      </div>

      <div class="form-group mb-1">
        <label for="password">Mot de passe</label>
        <input type="password" id="password" required autocomplete="current-password" />
      </div>

      <div class="error-msg" id="error-msg">
        <span id="error-text">Identifiants incorrects.</span>
      </div>

      <button type="submit" class="btn btn-primary login-btn-full" id="login-btn">
        Se connecter
      </button>
    </form>

  </div>

  <script type="module">
    import { login } from './js/auth.js';

    const form    = document.getElementById('login-form');
    const errDiv  = document.getElementById('error-msg');
    const errText = document.getElementById('error-text');
    const btn     = document.getElementById('login-btn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errDiv.classList.remove('show');
      btn.disabled = true;
      btn.innerHTML = `Connexion en cours…`;

      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      try {
        await login(email, password);
        // La redirection est gérée par auth.js via onAuthStateChanged
      } catch (err) {
        const msgs = {
          'auth/user-not-found':  'Aucun compte associé à cet e-mail.',
          'auth/wrong-password':  'Mot de passe incorrect.',
          'auth/invalid-email':   'Adresse e-mail invalide.',
          'auth/too-many-requests': 'Trop de tentatives. Réessayez plus tard.',
          'auth/invalid-credential': 'Identifiants incorrects.',
        };
        errText.textContent = msgs[err.code] || `Erreur : ${err.message}`;
        errDiv.classList.add('show');
        btn.disabled = false;
        btn.innerHTML = `Se connecter`;
      }
    });
  </script>
</body>
</html>
